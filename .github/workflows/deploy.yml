name: Deploy Worker

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Production
        if: github.ref == 'refs/heads/main'
        run: |
          node -e "
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('dist/server/wrangler.json', 'utf8'));
            config.name = 'havre-production';
            config.kv_namespaces = [{ binding: 'SESSION', id: process.env.KV_PRODUCTION_ID }];
            fs.writeFileSync('dist/server/wrangler.json', JSON.stringify(config));
          "
          npx wrangler deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          KV_PRODUCTION_ID: ${{ secrets.KV_PRODUCTION_ID }}

      - name: Deploy to Preview
        if: github.ref != 'refs/heads/main'
        run: |
          node -e "
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('dist/server/wrangler.json', 'utf8'));
            config.name = 'havre-preview';
            config.kv_namespaces = [{ binding: 'SESSION', id: process.env.KV_PREVIEW_ID }];
            fs.writeFileSync('dist/server/wrangler.json', JSON.stringify(config));
          "
          npx wrangler deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          KV_PREVIEW_ID: ${{ secrets.KV_PREVIEW_ID }}